settings:
  home_dir: /var/lib/computron_9000
virtual_computer:
  home_dir: /home/computron

tools:
  web:
    search_google:
      state_file: ".browser-state.json"
      no_save_state: false
      timeout: 6000
  browser:
    channel: chrome  # "chrome" = system Chrome, null = bundled Chromium
    headless: false  # true = no GUI, false = visible browser window
    human:
      pointer:
        hover_min_ms: 90
        hover_max_ms: 180
        click_hold_min_ms: 35
        click_hold_max_ms: 75
      typing:
        delay_min_ms: 45
        delay_max_ms: 140
        extra_pause_every_chars: 6
        extra_pause_min_ms: 160
        extra_pause_max_ms: 320
    scroll_warn_threshold: 10
    scroll_hard_limit: 15
    waits:
      network_idle_timeout_ms: 3000
      font_timeout_ms: 1000
      dom_mutation_timeout_ms: 1500
      dom_quiet_window_ms: 150
      animation_timeout_ms: 1000
agents:
  web:
    think: false
  file_system:
    think: false

desktop:
  display: ":0"
  resolution: "1280x720"
  websocket_port: 6080
  screenshot_quality: 70
  vision_model: qwen3.5:4b

vision:
  model: qwen3.5:4b
  think: false
  options:
    num_ctx: 60000
    num_predict: 512
    temperature: 0.3
    top_k: 20

summary:
  model: kimi-k2.5:cloud
  think: false
  options:
    num_ctx: 32768
    num_predict: 8192
    temperature: 0.3
    top_k: 20

skills:
  enabled: false
  extraction_interval_seconds: 300
  extraction_model: qwen3.5:cloud
  extraction_options:
    num_ctx: 60000
    temperature: 0.3
  max_skills: 200
  single_conversation_extraction: true

# LLM settings. If LLM_HOST env var is set and non-blank, it overrides this value.
# Otherwise, this YAML value is used as the default.
llm:
  provider: ollama

parallel:
  enabled: true
  max_concurrent: 4

goals:
  enabled: true
  poll_interval: 5
  max_concurrent: 2
  max_retries: 3
  timezone: America/Chicago
  model: "kimi-k2.5:cloud"
  num_ctx: 60000
  notifications:
    enabled: true
