settings:
  home_dir: /home/larry/.computron_9000
virtual_computer:
  container_name: computron_virtual_computer
  container_user: computron
  home_dir: /home/larry/.computron_9000/container_home
  container_working_dir: /home/computron

tools:
  web:
    search_google:
      state_file: ".browser-state.json"
      no_save_state: false
      timeout: 6000
  browser:
    channel: chrome  # "chrome" = system Chrome, null = bundled Chromium
    human:
      pointer:
        hover_min_ms: 90
        hover_max_ms: 180
        click_hold_min_ms: 35
        click_hold_max_ms: 75
      typing:
        delay_min_ms: 45
        delay_max_ms: 140
        extra_pause_every_chars: 6
        extra_pause_min_ms: 160
        extra_pause_max_ms: 320
    scroll_warn_threshold: 5
    scroll_hard_limit: 10
    waits:
      network_idle_timeout_ms: 3000
      font_timeout_ms: 1000
      dom_mutation_timeout_ms: 1500
      dom_quiet_window_ms: 150
      animation_timeout_ms: 1000
agents:
  web:
    think: false
  file_system:
    think: false

desktop:
  display: ":1"
  resolution: "1280x720"
  websocket_port: 6080
  screenshot_quality: 70

vision:
  model: qwen3.5:35b-a3b
  think: true
  options:
    num_ctx: 60000

summary:
  model: qwen3:8b
  think: false
  options:
    num_ctx: 60000
    temperature: 0.3
    top_k: 20

skills:
  enabled: true
  extraction_interval_seconds: 300
  extraction_model: qwen3.5:cloud
  extraction_options:
    num_ctx: 60000
    temperature: 0.3
  max_skills: 200
  single_conversation_extraction: true

# LLM settings. If LLM_HOST env var is set and non-blank, it overrides this value.
# Otherwise, this YAML value is used as the default.
llm:
  provider: ollama
