settings:
  home_dir: /var/lib/computron
virtual_computer:
  home_dir: /home/computron

features:
  image_generation: ${ENABLE_IMAGE_GEN:-false}
  music_generation: ${ENABLE_MUSIC_GEN:-false}
  desktop: ${ENABLE_DESKTOP:-false}
  visual_grounding: ${ENABLE_GROUNDING:-false}
  custom_tools: ${ENABLE_CUSTOM_TOOLS:-false}

tools:
  browser:
    headless: false  # true = no GUI, false = visible browser window
    human:
      pointer:
        hover_min_ms: 90
        hover_max_ms: 180
        click_hold_min_ms: 35
        click_hold_max_ms: 75
      typing:
        delay_min_ms: 45
        delay_max_ms: 140
        extra_pause_every_chars: 6
        extra_pause_min_ms: 160
        extra_pause_max_ms: 320
    scroll_warn_threshold: 10
    scroll_hard_limit: 15
    waits:
      network_idle_timeout_ms: 3000
      font_timeout_ms: 1000
      dom_mutation_timeout_ms: 1500
      dom_quiet_window_ms: 150
      animation_timeout_ms: 1000
desktop:
  resolution: "1280x720"
  websocket_port: 6080
  vision_model: qwen3.5:4b

vision:
  model: qwen3.5:4b
  think: false
  options:
    num_ctx: 60000
    num_predict: 512
    temperature: 0.3
    top_k: 20

summary:
  model: kimi-k2.5:cloud
  think: false
  options:
    num_ctx: 32768
    num_predict: 8192
    temperature: 0.3
    top_k: 20

llm:
  provider: ollama
  host: ${LLM_HOST}
  api_key: ${LLM_API_KEY}

parallel:
  enabled: true
  max_concurrent: 4

goals:
  enabled: true
  poll_interval: 5
  max_concurrent: 2
  timezone: America/Chicago
  notifications:
    enabled: true
