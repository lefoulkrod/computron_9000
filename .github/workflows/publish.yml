name: Publish Multi-Arch Image

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  # Build each platform natively on its own runner — no QEMU emulation.
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: container/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          # Push by digest only — tags applied in the merge job.
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Store digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.platform }}.txt

      - name: Upload digest
        uses: actions/upload-artifact@v5
        with:
          name: digests-${{ matrix.platform }}
          path: /tmp/digests/${{ matrix.platform }}.txt
          retention-days: 1

  # Merge per-platform images into a single multi-arch manifest and tag it.
  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v5
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest and push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=(-t "$tag")
          done <<< "$TAGS"
          docker buildx imagetools create "${tag_args[@]}" \
            $(printf 'ghcr.io/${{ github.repository }}@%s ' $(cat /tmp/digests/*.txt))
